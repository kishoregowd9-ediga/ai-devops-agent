name: DevOps Agent Demo

on: [push]

jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - uses: actions/checkout@v3

  - name: Simulate failure
    run: |
      echo "Docker build failed: base image not found"
      exit 1

  - name: Send logs to AI Agent
    if: failure()
    run: |
      curl -X POST https://YOUR_FUNCTION_URL/api/analyze \
      -d "Docker build failed: base image not found"